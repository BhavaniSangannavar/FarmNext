{% extends 'base.html' %}

{% block content %}

<h2 style="text-align:center; color:#2e7d32;">Place Order</h2>

<div style="
    max-width:400px;
    margin:30px auto;
    background:#fff;
    padding:20px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
">

    <h3 style="text-align:center;">
        {{ product.name }}
    </h3>

    <p>
        <b>Price:</b> ₹{{ product.price }}
    </p>

    <p>
        <b>Available Quantity:</b>
        {{ product.quantity }} {{ product.unit }}
    </p>

    {% if error %}
        <p style="color:red; text-align:center;">
            {{ error }}
        </p>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <label><b>Quantity</b></label>

        <input
            type="number"
            name="quantity"
            value="1"
            min="1"
            max="{{ product.quantity }}"
            style="
                width:100%;
                padding:10px;
                margin:10px 0;
                border-radius:10px;
                border:1px solid #ccc;
            "
        >

        <label><b>Unit</b></label>

        <select
            name="unit"
            style="
                width:100%;
                padding:10px;
                margin-bottom:15px;
                border-radius:10px;
            "
        >
            <option value="kg">kg</option>
            <option value="g">g</option>
        </select>

        <h3 style="text-align:center; margin-top:20px; color:#2e7d32;">
            Delivery Details
        </h3>

        <input
            type="text"
            name="name"
            placeholder="Full Name"
            required
            style="
                width:100%;
                padding:10px;
                margin:10px 0;
                border-radius:10px;
                border:1px solid #ccc;
            "
        >

        <input
            type="text"
            name="phone"
            placeholder="Phone Number"
            required
            style="
                width:100%;
                padding:10px;
                margin:10px 0;
                border-radius:10px;
                border:1px solid #ccc;
            "
        >

        <textarea
            name="address"
            placeholder="Full Address"
            rows="3"
            required
            style="
                width:100%;
                padding:10px;
                margin:10px 0;
                border-radius:10px;
                border:1px solid #ccc;
            "
        ></textarea>

        <input
            type="text"
            name="city"
            placeholder="City"
            required
            style="
                width:100%;
                padding:10px;
                margin:10px 0;
                border-radius:10px;
                border:1px solid #ccc;
            "
        >

        <input
            type="text"
            name="pincode"
            placeholder="Pincode"
            required
            style="
                width:100%;
                padding:10px;
                margin:10px 0 15px 0;
                border-radius:10px;
                border:1px solid #ccc;
            "
        >

        
        <button
            type="submit"
            style="
                width:100%;
                background:yellow;
                color:black;
                font-weight:bold;
                padding:12px;
                border:none;
                border-radius:20px;
                cursor:pointer;
                transition:0.3s;
            "
        >
            Place Order
        </button>

    </form>

</div>

{% endblock %}
